<script>
    function getQueryString(name) {
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
        var r = window.location.search.substr(1).match(reg);
        if (r != null) {
            return unescape(r[2]);
        }
        return null;
    }

    function getDeviceType() {
        //获取请求头中的userAgent
        var u = navigator.userAgent;
        //是否是android浏览器
        var isAndroid = u.indexOf("Android") > -1;
        //是否是ios浏览器
        var isIos = !!u.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/);
        var msg = "";
        if (isAndroid) {
            return 1;
        } else if (isIos) {
            return 2;
        } else {
            return 4;
        }
    }

    const progressBar = document.querySelector(".jindu");

    function countdown(startTime, endTime, elementId, countdownTime, callBack) {
        // 计算时间差
        var diff = Math.floor((endTime - startTime) / 1000);
        // 更新倒计时
        const timer = setInterval(() => {
            // 将时间差转换为天、小时、分钟、秒等时间单位

            // 将时间单位显示在页面上
            const countdown = document.getElementById(elementId);
            countdown.innerHTML = `截图前往微信扫一扫,倒计时${diff}`;
            // 更新时间差
            diff--;

            const progressWidth = (diff / countdownTime) * 100;
            console.log(progressWidth);
            progressBar.style.setProperty("--progress-width", `${progressWidth}%`);
            // 如果时间差为0，则停止倒计时
            if (diff < 0) {
                clearInterval(timer);
                // countdown.innerHTML = "";
                callBack && callBack();
            }
        }, 1000);
        return timer;
    }
</script>
