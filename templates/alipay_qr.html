    <style>
        body {

        a {

        }

        .wrap {

        .container {

        .check_button {

        }

            background-color: #69b1ff;
        }

        .check_button + .check_button {
            margin-left: 8px;
        }

        .foot {
            position: fixed;
            width: 100%;
            bottom: 10px;
            left: 0;
            padding-left: 16px;
            padding-right: 16px;
            padding-bottom: constant(safe-area-inset-bottom);

            box-sizing: border-box;
        }

        .foot_title {
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .img {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 3.5rem;
            padding: 0 0.24rem;
            background-size: 100%;
            background-position-y: -0.25rem;
            box-sizing: border-box;
            color: #eeeeee;
            text-align: left;
        }

        .a_button {
            font-weight: 500;
            text-decoration: inherit;
            color: #1676ff;
        }

        .qrcode {
            min-height: 100%;
            margin: 0 auto;
            box-sizing: border-box;
            text-align: center;
        }

        .warning-tip {
            padding: 8px 16px;
            background-color: #ecf8ff;
            border-radius: 4px;
            border-left: 5px solid #50bfff;
            margin: 20px 0;
        }

        .warning-tip p {
            font-size: 14px;
            color: #5e6d82;
            line-height: 1.5em;
        }

        .danger {
            font-size: 18px;
            color: #f56c6c;
        }

        .sytime {
            text-align: center;
            padding-top: 15px;
            box-sizing: border-box;
        }

        .qrcodeCont {
            padding-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            background-color: white;
            box-shadow: 0 2px 8px 0 rgb(0 0 0 / 2%);
            width: 200px;
            height: 200px;
            margin: 0 auto;
            padding: 20px;
        }

        .jindu {
            display: block;
            position: absolute;
            width: var(--progress-width, 100%);
            height: 100%;
            left: 0;
            top: 0;
            z-index: 1;
            background-color: #1676ff;
            transition: width 1s linear;
        }

        .paytext {
            position: relative;
            z-index: 2;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            width: 100%;
            height: 44px;
            background-color: #fff;
            display: flex;
            align-items: center;
        }

        .header .icon {
            width: 44px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header .icon img {
            display: block;
            width: 35px;
            height: 35px;
        }

        .header .info {
            flex: 1;
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 500;
            justify-content: center;
        }

        .header .info img {
            display: block;
            width: 24px;
            height: 24px;
            margin-right: 5px;
        }

        .button {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 54px;
            border-radius: 6px;
            border: 1px solid #3875f6;
            box-sizing: border-box;
            font-size: 18px;
        }

        .payButton {
            margin-top: 30px;
            background-color: #3875f6;
            cursor: pointer;
            color: #fff;
        }

        .webButton {
            margin-top: 20px;
            color: #3875f6;
            cursor: pointer;
        }

        .textButton {
            text-align: center;
            font-size: 18px;
            padding: 20px 0;
            color: #3875f6;
        }

        .footText {
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 2;
            font-size: 16px;
            padding: 20px 0;
            text-align: center;
            color: #526a95;
            width: 100%;
        }

        .scan_tips {
            text-align: center;
            padding: 20px 0;
            font-size: 16px;
            color: hsl(0, 0%, 58%);
            /* color: rgba(102, 102, 102, 0.7); */
        }
    </style>
</head>

<script type="text/javascript">
    var visitorId = "";
    var payUrl = "";
    var domain = window.location.host;
    var protocol = window.location.protocol;
    var queryUrl = protocol + "//" + domain + "{{.CheckURL}}";

    function queryStatus(pay_url) {
        $.post(
            queryUrl,
            {},
            function (res) {
                if (res.code === 1002) {
                    var data = res.data;
                    location.href = data.jump_url
                }
            }
        );
    }

    function unescapeToEscape(str) {
        var entityMap = {
            escape: {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&apos;",
            },
            unescape: {
                "&amp;": "&",
                "&apos;": "'",
                "&gt;": ">",
                "&lt;": "<",
                "&quot;": '"',
            },
        };
        var entityReg = {
            escape: RegExp("[" + Object.keys(entityMap.escape).join("") + "]", "g"),
            unescape: RegExp(
                "(" + Object.keys(entityMap.unescape).join("|") + ")",
                "g"
            ),
        };
        if (typeof str !== "string") return "";
        return str.replace(entityReg.unescape, function (match) {
            return entityMap.unescape[match];
        });
    }

    const qrcodeContainer = document.getElementById("qrcode");
    let qrcode = null

    function gotoAliPay() {
        var base_url = unescapeToEscape("{{.URL}}")
        //console.log(base_url)
        try {
            new URL(base_url)
        } catch (e) {
            alert("{{.Error}}")
            return
        }
        payUrl = base_url
        // if (base_url.indexOf("https://") !== -1) {
        //     payUrl = base_url
        // } else if (base_url.indexOf("alipays://platformapi") === -1) {
        //     payUrl =
        //         "alipayqr://platformapi/startapp?saId=10000007&qrcode=" +
        //         encodeURIComponent(base_url);
        // } else {
        //     payUrl = base_url
        // }

        if (qrcode) {
            qrcode.clear(); // clear the code.
            qrcode.makeCode(payUrl); // make another code.
        } else {
            qrcode = new QRCode(qrcodeContainer, {
                text: payUrl,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H,
            });
        }

    }

    gotoAliPay()

    if (payUrl !== "") {
        setInterval(function () {
            queryStatus(payUrl)
        }, 2000)
    }
</script>
