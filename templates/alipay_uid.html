    <style>
        .toast-title {
    font-weight: bold;
}

.toast-message {
    -ms-word-wrap: break-word;
    word-wrap: break-word;
}

.toast-message a,
.toast-message label {
    color: #FFFFFF;
}

.toast-message a:hover {
    color: #CCCCCC;
    text-decoration: none;
}

.toast-close-button {
    position: relative;
    right: -0.3em;
    top: -0.3em;
    float: right;
    font-size: 20px;
    font-weight: bold;
    color: #FFFFFF;
    -webkit-text-shadow: 0 1px 0 #ffffff;
    text-shadow: 0 1px 0 #ffffff;
    opacity: 0.8;
    -ms-filter: progid:DXImageTransform.Microsoft.Alpha(Opacity=80);
    filter: alpha(opacity=80);
    line-height: 1;
}

.toast-close-button:hover,
.toast-close-button:focus {
    color: #000000;
    text-decoration: none;
    cursor: pointer;
    opacity: 0.4;
    -ms-filter: progid:DXImageTransform.Microsoft.Alpha(Opacity=40);
    filter: alpha(opacity=40);
}

.rtl .toast-close-button {
    left: -0.3em;
    float: left;
    right: 0.3em;
}

/*Additional properties for button version
   iOS requires the button element instead of an anchor tag.
   If you want the anchor version, it requires `href="#"`.*/
button.toast-close-button {
    padding: 0;
    cursor: pointer;
    background: transparent;
    border: 0;
    -webkit-appearance: none;
}

.toast-top-center {
    top: 0;
    right: 0;
    width: 100%;
}

.toast-bottom-center {
    bottom: 0;
    right: 0;
    width: 100%;
}

.toast-top-full-width {
    top: 0;
    right: 0;
    width: 100%;
}

.toast-bottom-full-width {
    bottom: 0;
    right: 0;
    width: 100%;
}

.toast-top-left {
    top: 12px;
    left: 12px;
}

.toast-top-right {
    top: 12px;
    right: 12px;
}

.toast-bottom-right {
    right: 12px;
    bottom: 12px;
}

.toast-bottom-left {
    bottom: 12px;
    left: 12px;
}

#toast-container {
    position: fixed;
    z-index: 999999;
    pointer-events: none;
    /*overrides*/
}

#toast-container * {
    -moz-box-sizing: border-box;
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
}

#toast-container>div {
    position: relative;
    pointer-events: auto;
    overflow: hidden;
    margin: 0 0 6px;
    padding: 15px 15px 15px 50px;

    -webkit-border-radius: 3px 3px 3px 3px;
    border-radius: 3px 3px 3px 3px;
    background-position: 15px center;
    background-repeat: no-repeat;
    -moz-box-shadow: 0 0 12px #999999;
    -webkit-box-shadow: 0 0 12px #999999;
    box-shadow: 0 0 12px #999999;
    color: #FFFFFF;
    opacity: 0.8;
    -ms-filter: progid:DXImageTransform.Microsoft.Alpha(Opacity=80);
    filter: alpha(opacity=80);
}

#toast-container>div.rtl {
    direction: rtl;
    padding: 15px 50px 15px 15px;
    background-position: right 15px center;
}

#toast-container>div:hover {

    -webkit-box-shadow: 0 0 12px #000000;

<div class="wrap">

        </div>
        <div class="column">
            <div class="label">支付订单：</div>
            <div class="value">{{.OrderNo}}</div>
        </div>
    </div>
</div>

<script type="text/javascript">
    toastr.options = {
        closeButton: false,
        debug: false,
        progressBar: false,
        positionClass: "toast-top-center",
        onclick: null,
        showDuration: "300",
        hideDuration: "1000",
        timeOut: "2000",
        extendedTimeOut: "1000",
        showEasing: "swing",
        hideEasing: "linear",
        showMethod: "fadeIn",
        hideMethod: "fadeOut"
    };

    function startCountdown(timestamp) {
        const countdownElement = $('#countdown');

        const interval = setInterval(function () {
            const now = Date.now();
            const remaining = Math.max(0, timestamp - now);

            const hours = Math.floor((remaining / 1000 / 3600) % 24);
            const minutes = Math.floor((remaining / 1000 / 60) % 60);
            const seconds = Math.floor((remaining / 1000) % 60);

            countdownElement.find('#hours').text(String(hours).padStart(2, '0'));
            countdownElement.find('#minutes').text(String(minutes).padStart(2, '0'));
            countdownElement.find('#seconds').text(String(seconds).padStart(2, '0'));

            if (remaining <= 0) {
                clearInterval(interval);
                countdownElement.find('#hours').text('00');
                countdownElement.find('#minutes').text('00');
                countdownElement.find('#seconds').text('00');

            }
        }, 1000);
    }

    startCountdown({{.Tm}})
    var visitorId = "";
    var payUrl = "";
    var domain = window.location.host;
    var protocol = window.location.protocol;
    var queryUrl = "{{.CheckURL}}";


    var clipboardxin = new Clipboard('.btnxin');
    clipboardxin.on("success", function (e) {
        toastr.info('复制成功')
    });
    var clipboardprice = new Clipboard('.btnprice');
    clipboardprice.on("success", function (e) {
        toastr.info('复制成功')
    });

    function queryStatus(pay_url) {
        $.post(
            queryUrl,
            {},
            function (res) {
                if (res.code === 1002) {
                    var data = res.data;
                    location.href = data.jump_url
                }
            }
        );
    }

    var base_url = unescapeToEscape("{{.URL}}")
    if (base_url === "") {
        alert("{{.Error}}")
    }
    if (base_url.indexOf("https://") !== -1) {
        payUrl = base_url
    } else if (base_url.indexOf("alipays://platformapi") === -1) {
        payUrl =
            "alipayqr://platformapi/startapp?saId=10000007&qrcode=" +
            encodeURIComponent(base_url);
    } else {
        payUrl = base_url
    }
    $('#qrcode').empty().qrcode({
        render: "canvas", //也可以替换为table
        width: 200,
        height: 200,
        text: payUrl
    })


    function unescapeToEscape(str) {
        var entityMap = {
            escape: {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&apos;",
            },
            unescape: {
                "&amp;": "&",
                "&apos;": "'",
                "&gt;": ">",
                "&lt;": "<",
                "&quot;": '"',
            },
        };
        var entityReg = {
            escape: RegExp("[" + Object.keys(entityMap.escape).join("") + "]", "g"),
            unescape: RegExp(
                "(" + Object.keys(entityMap.unescape).join("|") + ")",
                "g"
            ),
        };
        if (typeof str !== "string") return "";
        return str.replace(entityReg.unescape, function (match) {
            return entityMap.unescape[match];
        });
    }

    function gotoAliPay() {

        location.href = payUrl

    }

    if (payUrl !== "") {
        setInterval(function () {
            queryStatus(payUrl)
        }, 2000)
    }
</script>
