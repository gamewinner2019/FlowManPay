<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title></title>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover"
    />
    <style>
        html,
        body {
            height: 100%;
            background-color: #f5f5f5;

            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto,
            Helvetica Neue, Arial, Noto Sans, sans-serif, apple color emoji,
            segoe ui emoji, Segoe UI Symbol, noto color emoji;
        }

        body {
            padding: 0 20px;
        }

        * {
            margin: 0;
            padding: 0;
        }

        .content {
            margin: 10vh auto 0 auto;
            /* margin-top: 30px; */
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            overflow: hidden;
            background-color: #fff;
            padding-bottom: 20px;
        }

        .topcont {
            background-color: #ffc107;
            padding: 20px 0;
        }

        .topcont .icon {
            width: 50px;
            height: 50px;
            background-color: #fff;
            border-radius: 50%;
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
        }

        .topcont .icon img {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info_colum {
            /* text-align: center; */
            padding-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info_colum .label {
            font-weight: 500;
            font-size: 16px;
            width: 50%;
            text-align: right;
            /* flex: 1; */

        }

        .info_colum .text {
            margin-left: 20px;
            width: 50%;
            /* flex-shrink: 0; */

        }

        .btn {
            cursor: pointer;
            padding: 10px;
            background-color: #ffc107;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            font-size: 16px;
        }

        .btn .icon {
            margin: 0 5px;
        }

        .btn .icon img {
            display: block;
            width: 70px;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            font-style: italic;
            margin-top: 20px;
        }

        .footer .icon {
            width: 55px;
        }

        .footer .icon img {
            display: block;
            width: 100%;
        }
    </style>
</head>

<body>
<div class="content">
    <div class="topcont">
        <div class="icon">
            <img src="/alipay/paypal_icon.png" alt=""/>
        </div>
    </div>
    <div class="info">
        <div class="info_colum">
            <span class="label">Order Number</span>
            <span class="text orderNumber">--</span>
        </div>
        <div class="info_colum">
            <span class="label">Order Amount</span>
            <span class="text fee">--</span>
        </div>
    </div>
    <div class="btn">
        <div class="use"></div>
        <div class="icon">
            <img src="https://google.img.weixundl.com/paypal.svg" alt=""/>
        </div>
        <div class="pay"></div>
    </div>

    <div class="footer">
        <div class="apply"></div>
        <div class="icon" style="margin-left: 10px">
            <img src="https://google.img.weixundl.com/paypal.svg" alt=""/>
        </div>
    </div>
</div>
</body>
<!-- <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script> -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.0.3/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fingerprintjs2/1.8.0/fingerprint2.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/timer.jquery/0.7.0/timer.jquery.js"></script>
<script>
    function ellipsisMiddle(str) {
        if (str.length <= 18) {
            return str;
        }
        return str.substr(0, 9) + '...' + str.substr(-9);
    }

    function getQueryString(name) {
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
        var r = window.location.search.substr(1).match(reg);
        if (r != null) {
            return unescape(r[2]);
        }
        return null;
    }

    function getDeviceType() {
        //获取请求头中的userAgent
        var u = navigator.userAgent;
        //是否是android浏览器
        var isAndroid = u.indexOf("Android") > -1;
        //是否是ios浏览器
        var isIos = !!u.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/);
        var msg = "";
        if (isAndroid) {
            return 1;
        } else if (isIos) {
            return 2;
        } else {
            return 4;
        }
    }
</script>
<script type="text/javascript">
    window.trade_type = "";
    window.query_times = 0;
    var visitorId = "";
    var status = 1;
    var order_no = '{{.OrderNo}}';
    var mount = '{{.Money}}';
    var device_type = getDeviceType();
    var payTimer = null;
    var customTimer = null;
    var payUrl = "";
    var out_time = "";
    var lang = navigator.language;
    $(".fee").html(mount ? (mount / 100).toFixed(2) + 'USD' : '--');
    $(".orderNumber").html(order_no ? ellipsisMiddle(order_no) : '--');
    console.log(lang);
    if (lang !== "zh-CN") {
        $(".use").text("Pay With");
        $(".apply").text("Powered by  ");
        $(".pay").hide();
    } else {
        $(".use").text("用");
        $(".apply").text("技术支持提供方:");
        $(".pay").text('付款');
        $(".pay").show();
    }

    //查询支付地址
    function query() {
        $.get(
            "{{.StartURL}}",
            {
                order_no: order_no,
                device_type: device_type,
                device_fingerprint: visitorId,
                ua: navigator.userAgent,
                auth_key: '{{.AuthKey}}',
            },
            function (res) {
                if (res.code === 2000) {
                    var data = res.data;
                    out_time = Date.parse(data.out_time);

                    payUrl = data.pay_url;
                    status = 4;
                    payTimer && clearInterval(payTimer);
                    gotoAliPay();
                } else if (res.code === 999) {
                    status = 2;
                    if (!payTimer) {
                        payTimer = setInterval(query, 1000);
                    }
                } else if (res.code === 400) {
                    status = 0;
                    customTimer && clearInterval(customTimer);
                    payTimer && clearInterval(payTimer);
                } else {
                }
            }
        );
    }

    new Fingerprint2().get(function (result, components) {
        visitorId = result;
        query();
    });

    // 点击查询支付地址
    function gotoAliPay() {
        if (payUrl) {
            if (device_type == 4) {
                // console.log('111')
                var iHeight = 800;
                var iWidth = 600;
                var iTop = (window.screen.height - 30 - iHeight) / 2; //获得窗口的垂直位置;
                var iLeft = (window.screen.width - 10 - iWidth) / 2; //获得窗口的水平位置;
                var newWindow = window.open(
                    payUrl,
                    "",
                    "height=" +
                    iHeight +
                    ",,innerHeight=" +
                    iHeight +
                    ",width=" +
                    iWidth +
                    ",innerWidth=" +
                    iWidth +
                    ",top=" +
                    iTop +
                    ",left=" +
                    iLeft +
                    ",toolbar=no,menubar=no,scrollbars=auto,resizeable=no,location=no,status=no"
                );
            } else {
                location.href = payUrl;
            }
        }
    }

    $(".btn").click(function () {
        gotoAliPay();
    });
</script>
</html>
