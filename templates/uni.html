<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中</title>
    <style>
        /* CSS动画 */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* 加载图标样式 */
        .loader {
            border: 16px solid #f3f3f3; /* 灰色边框 */
            border-top: 16px solid #3498db; /* 蓝色边框 */
            border-radius: 50%; /* 圆形边框 */
            width: 120px;
            height: 120px;
            animation: spin 2s linear infinite; /* 应用旋转动画 */
            margin: 0 auto;
            margin-top: 100px;
        }

        /* 提示信息样式 */
        .message {
            text-align: center;
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.0.3/jquery.min.js"></script>
<div class="loader"></div>
<div class="message">请稍等...</div>
<div class="message">正在获取收银台</div>
</body>
<script type="text/javascript">
    var queryUrl = "{{.CheckURL}}";

    function queryStatus() {
        $.post(
            queryUrl,
            {},
            function (res) {
                if (res.code === 2000) {
                    location.href = res.data.payUrl
                } else if (res.code !== 4000) {
                    alert(res.msg)
                }
            }
        );
    }

    if (queryUrl !== "") {
        queryStatus()
        setInterval(function () {
            queryStatus()
        }, 2000)
    }
</script>
</html>
